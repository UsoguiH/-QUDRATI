<!DOCTYPE html>
<!-- Screenshot/dev harness: seeds state to skip the disclaimer and
     jumps to a screen via #path / #stats / #settings / #lesson / #pop / #done / #fail -->
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>قدراتي — معاينة</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Baloo+Bhaijaan+2:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<link rel="stylesheet" href="css/style.css">
<script>
  window.onerror = function (msg, src, line, col) {
    var d = document.createElement("div");
    d.style.cssText = "position:fixed;top:0;left:0;right:0;background:#FF4B4B;color:#fff;font:14px monospace;padding:8px;z-index:9999;direction:ltr;white-space:pre-wrap";
    d.textContent = "JS ERROR: " + msg + "\n" + (src || "").split("/").pop() + ":" + line + ":" + col;
    (document.body || document.documentElement).appendChild(d);
  };
  var examIn43 = new Date(Date.now() + 43 * 864e5);
  var tdy = new Date(), todayK = tdy.getFullYear() + "-" + (tdy.getMonth() + 1) + "-" + tdy.getDate();
  var lwk = Math.floor((new Date(new Date().setHours(0, 0, 0, 0)) - new Date(2026, 0, 4)) / (7 * 864e5));
  var lghosts = ["عبدالله", "نورة", "فهد", "ريم", "خالد", "لمى", "تركي", "جواهر", "عمر", "هند", "سلمان", "رنا", "بدر", "ليان"].map(function (n, i) { return { n: n, base: 30 + i * 9, rate: 18 + (i * 7) % 40 }; });
  localStorage.setItem("qudratState", JSON.stringify({
    league: { week: lwk, base: 527 - 240, ghosts: lghosts },
    daily: { day: todayK, n: location.hash === "#chest" || location.hash === "#chestready" ? 10 : location.hash === "#claimed" ? 10 : 6, claimed: location.hash === "#claimed" },
    v: 1, disclaimer: true, track: "sci", sound: false,
    user: location.hash === "#login" ? null : { name: "سارة", guest: false },
    xp: 527, streak: { count: 12, last: null },
    lessons: { "numbers.fractions": { stars: 3, plays: 1 } },
    qstats: { "oo-01": { r: 6, w: 2 }, "oo-02": { r: 4, w: 1 }, "cn-01": { r: 2, w: 3 }, "ge-ang-01": { r: 7, w: 1 } },
    examAsked: location.hash !== "#exam",
    exam: ["#exam", "#noexam"].includes(location.hash) ? null
      : examIn43.getFullYear() + "-" + String(examIn43.getMonth() + 1).padStart(2, "0") + "-" + String(examIn43.getDate()).padStart(2, "0")
  }));
</script>
</head>
<body>
  <div id="app" class="app"></div>
  <script src="js/data/skills.js"></script>
  <script src="js/data/numbers.js"></script>
  <script src="js/data/ratios.js"></script>
  <script src="js/data/geometry.js"></script>
  <script src="js/app.js"></script>
  <script>
    (function () {
      const h = location.hash.replace("#", "") || "path";
      if (["stats", "settings", "mock", "league"].includes(h)) A.go(h);
      else if (h === "chest") A.openChest();
      else if (h === "mocktest") A.startMock();
      else if (h === "mockdone") {
        A.startMock();
        for (let s = 0; s < 2; s++) {
          const total = document.querySelectorAll(".qn-chip").length;
          for (let i = 0; i < total; i++) {
            A.mockGo(i);
            const q = A.debugMock();
            const n = q.format === "comparison" ? 4 : q.choices.length;
            A.mockSelect(i % 3 === 0 ? (q.answer + 1) % n : q.answer);
          }
          A.mockEndSection();
          if (s === 0) A.mockNextSection();
        }
      }
      else if (h === "lesson") {
        const d = window.QBANK.numbers;
        A.startLesson("numbers", d.lessons[0].key);
      } else if (h === "pop") {
        const node = document.querySelector(".node:not(.node-locked):not(.node-done)");
        if (node) node.click();
      } else if (h === "fab") {
        const d = window.QBANK.numbers;
        A.startLesson("numbers", d.lessons[0].key);
        A.toggleHints();
      } else if (h === "fb") {
        const d = window.QBANK.numbers;
        A.startLesson("numbers", d.lessons[0].key);
        A.pick(0); A.check();
        A.toggleSol();
      } else if (h === "method") {
        const d = window.QBANK.skills;
        A.startLesson("skills", d.lessons[0].key);
        A.showMethod();
      } else if (h === "done") {
        const d = window.QBANK.numbers;
        A.startLesson("numbers", d.lessons[0].key);
        for (let i = 0; i < 200 && document.querySelector(".choices .choice"); i++) {
          A.pick(A.debugCurrent().answer); A.check(); A.next();
        }
      } else if (h === "fail") {
        const d = window.QBANK.numbers;
        A.startLesson("numbers", d.lessons[0].key);
        for (let i = 0; i < 3; i++) {
          const q = A.debugCurrent();
          A.pick((q.answer + 1) % (q.format === "comparison" ? 4 : q.choices.length));
          A.check(); A.next();
        }
      }
    })();
  </script>
</body>
</html>
